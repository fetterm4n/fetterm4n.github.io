{{ define "main" }}
<section class="section" aria-labelledby="projects-title">
  <h1 id="projects-title">Featured Projects</h1>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  <div class="project-list-vertical">
    {{ range .Site.Params.featuredProjects }}
      <article class="project-card">
        <img src="{{ partial "image-src.html" (dict "src" (or .image "/images/placeholder.png")) }}" alt="Project thumbnail" loading="lazy">
        <div class="project-body">
          <h2><a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .title }}</a></h2>
          <p>{{ .summary }}</p>
          <ul class="tag-list">
            {{ range .tags }}<li>{{ . }}</li>{{ end }}
          </ul>
        </div>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
